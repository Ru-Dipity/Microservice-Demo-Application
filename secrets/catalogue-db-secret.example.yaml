apiVersion: v1
kind: Secret
metadata:
  name: catalogue-db-secret
  namespace: sock-shop-dev
type: Opaque
stringData:
  # Replace with the real password when creating secret in cluster.
  MYSQL_ROOT_PASSWORD: "REPLACE_WITH_REAL_PASSWORD"

# Example usage (safe to commit):
# kubectl apply -f secrets/catalogue-db-secret.example.yaml
# or create secret directly:
# kubectl create secret generic catalogue-db-secret --from-literal=MYSQL_ROOT_PASSWORD=$PASSWORD -n sock-shop-dev
# For production, create the same secret name in the sock-shop-prod namespace.
