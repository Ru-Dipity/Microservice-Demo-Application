name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'Kubernetes/**'
      - '.github/workflows/**'
      - 'README.md'
  pull_request:
    branches:
      - main
      - develop

env:
  KUBE_MANIFEST_DEV: Kubernetes/deployment-dev.yaml
  KUBE_MANIFEST_PROD: Kubernetes/deployment-prod.yaml
  KUBE_NAMESPACE_DEV: sock-shop-dev
  KUBE_NAMESPACE_PROD: sock-shop-prod
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint

      - name: Validate YAML syntax
        run: |
          find Kubernetes -type f \( -name '*.yaml' -o -name '*.yml' \) -exec yamllint -d "{extends: default, rules: {line-length: {max: 120}}}" {} +

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: actions/setup-kubectl@v4
        with:
          version: '1.30.0'

      - name: Configure kubeconfig for dev
        run: |
          mkdir -p "$RUNNER_TEMP"
          echo "${{ secrets.KUBE_CONFIG_DATA_DEV }}" | base64 --decode > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Deploy manifests to dev cluster
        run: |
          kubectl apply -f Kubernetes/namespace-dev.yaml -f "$KUBE_MANIFEST_DEV"
          kubectl rollout status deploy --all --namespace=$KUBE_NAMESPACE_DEV --timeout=180s

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: actions/setup-kubectl@v4
        with:
          version: '1.30.0'

      - name: Configure kubeconfig for prod
        run: |
          mkdir -p "$RUNNER_TEMP"
          echo "${{ secrets.KUBE_CONFIG_DATA_PROD }}" | base64 --decode > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Deploy manifests to prod cluster
        run: |
          kubectl apply -f Kubernetes/namespace-prod.yaml -f "$KUBE_MANIFEST_PROD"
          kubectl rollout status deploy --all --namespace=$KUBE_NAMESPACE_PROD --timeout=180s
