name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'Kubernetes/**'
      - '.github/workflows/**'
      - 'README.md'
  pull_request:
    branches:
      - main
      - develop

env:
  KUBE_MANIFEST_DEV: Kubernetes/deployment-dev.yaml
  KUBE_MANIFEST_PROD: Kubernetes/deployment-prod.yaml
  KUBE_NAMESPACE_DEV: sock-shop-dev
  KUBE_NAMESPACE_PROD: sock-shop-prod

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install validation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip curl
          pip3 install yamllint
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Validate YAML syntax
        run: yamllint Kubernetes/**/*.yaml

      - name: Kubernetes dry-run validation
        run: |
          kubectl apply --dry-run=client -f Kubernetes/namespace-dev.yaml -f Kubernetes/namespace-prod.yaml -f "$KUBE_MANIFEST_DEV" -f "$KUBE_MANIFEST_PROD"

  security:
    name: Security checks
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install security tools
        run: |
          curl -LO https://github.com/stackrox/kube-linter/releases/download/v0.5.0/kube-linter_0.5.0_Linux_x86_64.tar.gz
          tar -xzf kube-linter_0.5.0_Linux_x86_64.tar.gz
          sudo mv kube-linter /usr/local/bin/
          curl -LO https://github.com/zegl/kube-score/releases/download/v1.17.0/kube-score_1.17.0_linux_amd64.tar.gz
          tar -xzf kube-score_1.17.0_linux_amd64.tar.gz
          sudo mv kube-score /usr/local/bin/

      - name: Run kube-linter
        run: kube-linter lint Kubernetes

      - name: Run kube-score
        run: kube-score score --exit-when-higher-than 6 Kubernetes

  build:
    name: Build / package manifests
    runs-on: ubuntu-latest
    needs: security
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      - name: Validate and package manifests
        run: |
          mkdir -p artifact
          cp "$KUBE_MANIFEST_DEV" "$KUBE_MANIFEST_PROD" Kubernetes/namespace-dev.yaml Kubernetes/namespace-prod.yaml artifact/
          kubectl apply --dry-run=client -f artifact/namespace-dev.yaml -f artifact/namespace-prod.yaml -f artifact/deployment-dev.yaml -f artifact/deployment-prod.yaml

      - name: Upload prepared manifests artifact
        uses: actions/upload-artifact@v4
        with:
          name: sock-shop-manifests
          path: artifact/

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.30.0'

      - name: Configure kubeconfig for dev
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA_DEV }}" | base64 --decode > "$HOME/.kube/config"

      - name: Deploy manifests to dev cluster
        run: |
          kubectl apply -f Kubernetes/namespace-dev.yaml -f "$KUBE_MANIFEST_DEV"
          kubectl rollout status deploy --all --namespace=$KUBE_NAMESPACE_DEV --timeout=180s

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: '1.30.0'

      - name: Configure kubeconfig for prod
        run: |
          mkdir -p "$HOME/.kube"
          echo "${{ secrets.KUBE_CONFIG_DATA_PROD }}" | base64 --decode > "$HOME/.kube/config"

      - name: Deploy manifests to prod cluster
        run: |
          kubectl apply -f Kubernetes/namespace-prod.yaml -f "$KUBE_MANIFEST_PROD"
          kubectl rollout status deploy --all --namespace=$KUBE_NAMESPACE_PROD --timeout=180s
