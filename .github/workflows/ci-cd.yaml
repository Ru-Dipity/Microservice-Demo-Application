name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'Kubernetes/**'
      - '.github/workflows/**'
      - 'README.md'
  pull_request:
    branches:
      - main
      - develop

env:
  KUBE_MANIFEST_DEV: Kubernetes/deployment-dev.yaml
  KUBE_MANIFEST_PROD: Kubernetes/deployment-prod.yaml
  KUBE_NAMESPACE_DEV: sock-shop-dev
  KUBE_NAMESPACE_PROD: sock-shop-prod
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install yamllint
        run: |
          python -m pip install --upgrade pip
          python -m pip install yamllint

      - name: Validate YAML syntax
        run: |
          find Kubernetes -type f \( -name '*.yaml' -o -name '*.yml' \) -exec yamllint -d "{extends: default, rules: {line-length: {max: 120}}}" {} +

  scan:
    name: Scan Docker images (Trivy)
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin
          trivy -v

      - name: Find images in Kubernetes manifests
        id: find_images
        run: |
          imgs=$(grep -RhoP "image:\s*\K.*" Kubernetes || true)
          echo "list<<EOF" >> $GITHUB_OUTPUT
          echo "$imgs" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Scan images with Trivy (warn only)
        if: steps.find_images.outputs.list != ''
        run: |
          echo "Images to scan:"
          echo "${{ steps.find_images.outputs.list }}"
          while IFS= read -r img; do
            if [ -z "$img" ]; then
              continue
            fi
            echo "Scanning $img"
            trivy image --severity HIGH,CRITICAL --exit-code 0 --no-progress "$img"
          done <<< "${{ steps.find_images.outputs.list }}"

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: [test, scan]
    if: github.ref == 'refs/heads/develop'
    environment: development
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          mkdir -p "$HOME/bin"
          curl -L "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl" -o "$HOME/bin/kubectl"
          chmod +x "$HOME/bin/kubectl"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          kubectl version --client

      - name: Configure kubeconfig for dev
        run: |
          mkdir -p "$RUNNER_TEMP"
          echo "${{ secrets.KUBE_CONFIG_DATA_DEV }}" | base64 --decode > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Create catalogue DB secret in dev
        run: |
          kubectl create secret generic catalogue-db-secret \
            --from-literal=MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD_DEV }}" \
            -n "$KUBE_NAMESPACE_DEV" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests to dev cluster
        run: |
          kubectl apply -f Kubernetes/namespace-dev.yaml -f "$KUBE_MANIFEST_DEV"
          kubectl rollout status deployment -n "$KUBE_NAMESPACE_DEV" -l name --timeout=180s

  deploy-prod:
    name: Deploy to Prod
    runs-on: ubuntu-latest
    needs: [test, scan]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubectl
        run: |
          mkdir -p "$HOME/bin"
          curl -L "https://dl.k8s.io/release/v1.30.0/bin/linux/amd64/kubectl" -o "$HOME/bin/kubectl"
          chmod +x "$HOME/bin/kubectl"
          echo "$HOME/bin" >> "$GITHUB_PATH"
          kubectl version --client

      - name: Configure kubeconfig for prod
        run: |
          mkdir -p "$RUNNER_TEMP"
          echo "${{ secrets.KUBE_CONFIG_DATA_PROD }}" | base64 --decode > "$RUNNER_TEMP/kubeconfig"
          echo "KUBECONFIG=$RUNNER_TEMP/kubeconfig" >> "$GITHUB_ENV"

      - name: Create catalogue DB secret in prod
        run: |
          kubectl create secret generic catalogue-db-secret \
            --from-literal=MYSQL_ROOT_PASSWORD="${{ secrets.MYSQL_ROOT_PASSWORD_PROD }}" \
            -n "$KUBE_NAMESPACE_PROD" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy manifests to prod cluster
        run: |
          kubectl apply -f Kubernetes/namespace-prod.yaml -f "$KUBE_MANIFEST_PROD"
          kubectl rollout status deployment -n "$KUBE_NAMESPACE_PROD" -l name --timeout=180s
