apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: sock-ingress
  namespace: sock-shop-dev
spec:
  ingressClassName: traefik
  rules:
    - host: sockshop.lukas-gutgemacht.cloud-ip.cc
      http:
        paths:
          - pathType: Prefix
            path: /
            backend:
              service:
                name: front-end
                port:
                  number: 80