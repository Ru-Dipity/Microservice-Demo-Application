apiVersion: v1
kind: Namespace
metadata:
  name: backup-system
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-storage-pvc
  namespace: backup-system
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-db-backup
  namespace: backup-system
spec:
  schedule: "0 2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          # Deploying multiple containers within a single Pod to share the same persistent volume
          containers:
            # ----------------- Container 1: MySQL Backup -----------------
            - name: mysql-backup
              image: mysql:5.7
              env:
                - name: MYSQL_HOST
                  value: "catalogue-db.sock-shop-dev.svc.cluster.local"
                - name: MYSQL_USER
                  value: "root"
                - name: MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      # This secret must exist in the same namespace as the CronJob: backup-system.
                      name: catalogue-db-secret
                      key: MYSQL_ROOT_PASSWORD
                - name: BACKUP_DIR
                  value: "/backup/mysql"
                - name: RETENTION_DAYS
                  value: "7"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_FILE="${BACKUP_DIR}/catalogue-db-${TIMESTAMP}.sql"
                  mkdir -p "${BACKUP_DIR}"
                  echo "Starting MySQL backup: ${BACKUP_FILE}"
                  mysqldump \
                    -h "${MYSQL_HOST}" \
                    -u "${MYSQL_USER}" \
                    -p"${MYSQL_PASSWORD}" \
                    --all-databases \
                    --single-transaction \
                    --quick \
                    --lock-tables=false \
                    > "${BACKUP_FILE}"
                  gzip "${BACKUP_FILE}"
                  echo "Compressed MySQL backup completed."
                  find "${BACKUP_DIR}" -type f -name '*.sql.gz' -mtime +"${RETENTION_DAYS}" -delete

            # ----------------- Container 2: MongoDB Backup -----------------
            - name: mongodb-backup
              image: mongo
              env:
                - name: MONGO_HOST
                  value: "carts-db.sock-shop-dev.svc.cluster.local"
                - name: MONGO_PORT
                  value: "27017"
                - name: BACKUP_DIR
                  value: "/backup/mongodb"
                - name: RETENTION_DAYS
                  value: "7"
              volumeMounts:
                - name: backup-storage
                  mountPath: /backup
              command:
                - /bin/bash
                - -c
                - |
                  set -e
                  TIMESTAMP=$(date +%Y%m%d_%H%M%S)
                  BACKUP_PATH="${BACKUP_DIR}/carts-mongodb-${TIMESTAMP}"
                  mkdir -p "${BACKUP_DIR}"
                  echo "Starting MongoDB backup..."
                  
                  # Use a MongoDB tools image compatible with the deployed carts-db service.
                  mongodump \
                    --host "${MONGO_HOST}" \
                    --port "${MONGO_PORT}" \
                    --out "${BACKUP_PATH}"
                  
                  tar -czf "${BACKUP_PATH}.tar.gz" -C "$(dirname "${BACKUP_PATH}")" "$(basename "${BACKUP_PATH}")"
                  rm -rf "${BACKUP_PATH}"
                  echo "Compressed MongoDB backup completed."
                  find "${BACKUP_DIR}" -type f -name '*.tar.gz' -mtime +"${RETENTION_DAYS}" -delete

          volumes:
            - name: backup-storage
              persistentVolumeClaim:
                claimName: backup-storage-pvc
